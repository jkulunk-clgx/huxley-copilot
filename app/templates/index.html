<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huxley AI Chat</title>

    <!-- Google Fonts for a premium feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===========================
           CSS VARIABLES / DESIGN TOKENS
           These let us reuse colors and sizes throughout the stylesheet,
           making it easy to update the design in one place.
           =========================== */
        :root {
            --primary: #674CFF;
            --primary-light: #8B76FF;
            --primary-dark: #5238D4;
            --bg-white: #ffffff;
            --bg-warm: #FCF9F5;
            --bg-input: #F7EFE2;
            --text-dark: #2D2D2F;
            --text-muted: #6B6B6F;
            --border-color: #E2E2E5;
            --border-light: #F0F0F2;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        /* ===========================
           BASE / RESET STYLES
           Ensures consistent behavior across browsers.
           =========================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-warm);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===========================
           TOP HEADER BAR
           Contains the app title. Styled with a subtle glass effect
           and a bottom border for separation.
           =========================== */
        .header {
            text-align: center;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        /* ===========================
           MAIN LAYOUT
           A two-column flexbox layout. The left side holds the chat,
           the right side holds the persona canvas. On small screens
           they stack vertically.
           =========================== */
        .main-layout {
            display: flex;
            flex: 1;
            gap: 0;
            min-height: 0;
            /* allows children to shrink below content size */
        }

        /* ===========================
           CHAT PANEL (LEFT SIDE)
           Scrollable area for user input and AI response history,
           with a fixed input bar at the bottom.
           =========================== */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            border-right: 1px solid var(--border-color);
            background: var(--bg-white);
            position: relative;
        }

        /* Scrollable message area inside the chat panel */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: 100px;
            /* space for the fixed input bar */
        }

        /* The user's original message bubble */
        .user-message {
            background: var(--bg-input);
            padding: 14px 18px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            margin-left: 20%;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-dark);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        /* The AI's response bubble in the chat (summary/confirmation) */
        .ai-message {
            background: var(--bg-warm);
            padding: 14px 18px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-dark);
            border: 1px solid var(--border-light);
        }

        /* Action buttons below the AI response in the chat panel */
        .chat-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .chat-actions .btn-secondary {
            background: var(--bg-white);
            color: var(--primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .chat-actions .btn-secondary:hover {
            border-color: var(--primary);
            background: rgba(103, 76, 255, 0.04);
        }

        /* Empty state shown when there is no conversation yet */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            max-width: 320px;
            line-height: 1.5;
        }

        /* Error message block */
        .error-block {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #B91C1C;
        }

        /* ===========================
           BOTTOM INPUT BAR
           Fixed at the bottom of the chat panel so the user
           can always access the text input.
           =========================== */
        .input-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            padding: 16px 24px;
        }

        .input-form {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        /* Multi-line text input for the user's prompt */
        .input-form textarea {
            flex: 1;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            color: var(--text-dark);
            background: var(--bg-white);
            transition: border-color var(--transition-fast);
            line-height: 1.5;
        }

        .input-form textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(103, 76, 255, 0.1);
        }

        .input-form textarea::placeholder {
            color: var(--text-muted);
        }

        /* Send button */
        .input-form button[type="submit"] {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            width: 42px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .input-form button[type="submit"]:hover {
            background: var(--primary-dark);
            transform: scale(1.04);
        }

        /* ===========================
           PERSONA CANVAS (RIGHT SIDE)
           This panel displays the generated persona in a clean,
           readable format. It includes copy and download buttons
           in a toolbar at the top.
           =========================== */
        .canvas-panel {
            flex: 1;
            display: none;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-white);
            /* Slide-in animation when persona is loaded */
            animation: canvasSlideIn 0.4s ease-out;
        }

        .canvas-panel.active {
            display: flex;
        }

        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
        }

        @keyframes canvasSlideIn {
            from {
                opacity: 0;
                transform: translateX(12px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Toolbar at the top of the canvas panel with copy/download buttons */
        .canvas-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .canvas-toolbar-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .canvas-toolbar-actions {
            display: flex;
            gap: 6px;
        }

        /* Icon-style action buttons in the canvas toolbar */
        .canvas-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-warm);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .canvas-btn:hover {
            background: var(--bg-input);
            border-color: var(--primary-light);
            color: var(--primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .canvas-btn:active {
            transform: translateY(0);
        }

        /* Success state shown briefly after a successful copy */
        .canvas-btn.copied {
            background: #ECFDF5;
            border-color: #6EE7B7;
            color: #059669;
        }

        /* SVG icons inside toolbar buttons */
        .canvas-btn svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        /* The scrollable area where the persona markdown is rendered */
        .canvas-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        /* 
           Styles for the rendered markdown inside the canvas.
           These target the HTML elements that marked.js generates
           from the persona markdown content.
        */
        .canvas-content h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .canvas-content h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
            margin-top: 24px;
            margin-bottom: 8px;
        }

        .canvas-content p {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .canvas-content strong {
            font-weight: 600;
            color: var(--text-dark);
        }

        .canvas-content ul {
            padding-left: 20px;
            margin-bottom: 12px;
        }

        .canvas-content li {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .canvas-content blockquote {
            border-left: 3px solid var(--primary);
            padding: 12px 16px;
            margin: 16px 0;
            background: rgba(103, 76, 255, 0.03);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-style: italic;
            color: var(--text-muted);
        }

        /* Empty state for the canvas when no persona has been generated */
        .canvas-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .canvas-empty-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.25;
        }

        .canvas-empty h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .canvas-empty p {
            font-size: 13px;
            max-width: 260px;
            line-height: 1.5;
        }

        /* ===========================
           TOAST NOTIFICATION
           A small pop-up message shown briefly for copy/download
           confirmations. Appears centered at the bottom.
           =========================== */
        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-dark);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
        }

        .toast.visible {
            bottom: 32px;
        }

        /* ===========================
           RESPONSIVE LAYOUT
           On screens narrower than 768px, the two panels
           stack vertically instead of side-by-side.
           =========================== */
        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }

            .chat-panel {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                min-height: 50vh;
            }

            .canvas-panel {
                min-height: 50vh;
            }

            .user-message {
                margin-left: 10%;
            }
        }
    </style>
</head>

<body>
    <!-- ===========================
         HEADER
         Top bar with the application name.
         =========================== -->
    <div class="header">
        <h1>Huxley Copilot</h1>
    </div>

    <!-- ===========================
         MAIN LAYOUT
         Two-column layout: chat panel (left) and persona canvas (right).
         =========================== -->
    <div class="main-layout">
        <!-- ===========================
             CHAT PANEL (LEFT)
             Contains the conversation history and the input bar.
             =========================== -->
        <div class="chat-panel">
            <div class="chat-messages" id="chat-messages">
                <!-- Empty state shown before the user has sent a message -->
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h2>Start a Conversation</h2>
                    <p>Describe your target user group and Huxley will generate a detailed persona for you.</p>
                </div>
            </div>

            <!-- Fixed input bar at the bottom of the chat panel -->
            <div class="input-bar">
                <form method="POST" class="input-form" id="chat-form">
                    <textarea id="user_input" name="user_input" rows="2"
                        placeholder="Describe the user group for your artifact..." required></textarea>
                    <button type="submit" title="Send">➤</button>
                </form>
            </div>
        </div>

        <!-- ===========================
             PERSONA CANVAS (RIGHT)
             Displays the generated persona in a clean, readable format.
             Has a toolbar with Copy and Download actions.
             =========================== -->
        <div class="canvas-panel" id="canvas-panel">
            <!-- Loading State -->
            <div id="loading-state" class="loading-state" style="display: none;">
                <div class="loading-spinner"></div>
                <p>Generating content...</p>
            </div>

            <!-- Toolbar with title and action buttons -->
            <div class="canvas-toolbar" id="canvas-toolbar" style="display: none;">
                <span class="canvas-toolbar-title">Generated Content</span>
                <div class="canvas-toolbar-actions">
                    <button class="canvas-btn" id="copy-btn" onclick="copyPersona()" title="Copy content to clipboard">
                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="6" y="6" width="10" height="12" rx="1.5" />
                            <path d="M4 14V4a1.5 1.5 0 011.5-1.5H12" />
                        </svg>
                        Copy
                    </button>
                    <button class="canvas-btn" id="download-btn" onclick="downloadPersona()" title="Download as Markdown">
                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M10 3v10m0 0l-3.5-3.5M10 13l3.5-3.5" />
                            <path d="M3 15v1.5A1.5 1.5 0 004.5 18h11a1.5 1.5 0 001.5-1.5V15" />
                        </svg>
                        Download
                    </button>
                </div>
            </div>

            <!-- The rendered content area -->
            <div class="canvas-content" id="persona-canvas" style="display: none;">
                <!-- Markdown will be rendered here by marked.js -->
            </div>
            
            <script id="raw-markdown" type="application/json">""</script>
        </div>
    </div>

    <!-- Toast notification element (initially hidden off-screen) -->
    <div class="toast" id="toast">Copied to clipboard!</div>

    <!-- ===========================
         EXTERNAL LIBRARIES
         marked.js converts Markdown text into HTML so we can
         render the persona content nicely.
         =========================== -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        let pendingWebSearch = null;

        document.getElementById('chat-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const textarea = document.getElementById('user_input');
            const userInput = textarea.value.trim();
            if (!userInput) return;
            
            // 1. Update chat UI immediately
            document.getElementById('empty-state').style.display = 'none';
            const chatMessages = document.getElementById('chat-messages');
            
            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'user-message';
            userMsg.textContent = userInput;
            chatMessages.appendChild(userMsg);
            
            // Clear input
            textarea.value = '';

            const canvasPanel = document.getElementById('canvas-panel');
            
            if (pendingWebSearch) {
                if (["yes", "proceed", "y", "sure", "ok", "yeah"].includes(userInput.toLowerCase().trim())) {
                    const currentPending = pendingWebSearch;
                    pendingWebSearch = null;
                    
                    const notifMsg = document.createElement('div');
                    notifMsg.className = 'ai-message';
                    notifMsg.innerHTML = `<em>🛠️ Proceeding with web search...</em>`;
                    chatMessages.appendChild(notifMsg);
                    chatMessages.scrollTop = chatMessages.scrollHeight;

                    canvasPanel.classList.add('active');
                    document.getElementById('loading-state').style.display = 'flex';
                    document.getElementById('canvas-toolbar').style.display = 'none';
                    document.getElementById('persona-canvas').style.display = 'none';

                    // Jump straight to Phase 3
                    handleGenerationFetch(
                        fetch('/', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ user_input: currentPending.userInput, role: currentPending.role, allow_web_search: true })
                        })
                    );
                    return;
                } else {
                    pendingWebSearch = null;
                    const notifMsg = document.createElement('div');
                    notifMsg.className = 'ai-message';
                    notifMsg.innerHTML = `<em>Okay, request cancelled.</em>`;
                    chatMessages.appendChild(notifMsg);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    document.getElementById('loading-state').style.display = 'none';
                    canvasPanel.classList.remove('active');
                    return;
                }
            }
            
            // 2. Open canvas and show loading
            canvasPanel.classList.add('active');
            document.getElementById('loading-state').style.display = 'flex';
            document.getElementById('canvas-toolbar').style.display = 'none';
            document.getElementById('persona-canvas').style.display = 'none';
            
            // Scroll to bottom of chat
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // 3. Perform Phase 1: Intent Check
            fetch('/check_intent', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ user_input: userInput })
            })
            .then(response => response.json())
            .then(intentData => {
                if (intentData.error_message) {
                    throw new Error(intentData.error_message);
                }
                
                // If the backend plans to process raw data, notify the user immediately
                if (intentData.notification) {
                    const notifMsg = document.createElement('div');
                    notifMsg.className = 'ai-message';
                    notifMsg.innerHTML = `<em>🛠️ ${intentData.notification}</em>`;
                    chatMessages.appendChild(notifMsg);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
                
                if (intentData.needs_web_search_permission) {
                    pendingWebSearch = { userInput: userInput, role: intentData.role };
                    document.getElementById('loading-state').style.display = 'none';
                    canvasPanel.classList.remove('active');
                    return; // Stop here, wait for next user input
                }
                
                // 4. Perform Phase 2 & 3: Generation
                handleGenerationFetch(
                    fetch('/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ user_input: userInput, role: intentData.role })
                    })
                );
            })
            .catch(err => {
                document.getElementById('loading-state').style.display = 'none';
                canvasPanel.classList.remove('active');
                const errorMsg = document.createElement('div');
                errorMsg.className = 'error-block';
                errorMsg.innerHTML = `<strong>Error:</strong> ${err.message || 'An unexpected error occurred.'}`;
                chatMessages.appendChild(errorMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        });

        function handleGenerationFetch(fetchPromise) {
            fetchPromise
            .then(response => response.json())
            .then(data => {
                // Hide loading state
                document.getElementById('loading-state').style.display = 'none';
                
                if (data.error_message) {
                    const errorMsg = document.createElement('div');
                    errorMsg.className = 'error-block';
                    errorMsg.innerHTML = `<strong>Error:</strong> ${data.error_message}`;
                    chatMessages.appendChild(errorMsg);
                    document.getElementById('canvas-panel').classList.remove('active');
                } else {
                    // Update canvas with results
                    document.getElementById('raw-markdown').textContent = JSON.stringify(data.ai_response);
                    document.getElementById('persona-canvas').innerHTML = marked.parse(data.ai_response);
                    
                    document.getElementById('canvas-toolbar').style.display = 'flex';
                    document.getElementById('persona-canvas').style.display = 'block';
                    
                    // Add AI confirmation to chat
                    if (data.notification) {
                        const notifMsg = document.createElement('div');
                        notifMsg.className = 'ai-message';
                        notifMsg.innerHTML = `<em>🛠️ ${data.notification}</em>`;
                        chatMessages.appendChild(notifMsg);
                    }
                    
                    const aiMsg = document.createElement('div');
                    aiMsg.className = 'ai-message';
                    aiMsg.innerHTML = `✨ Content generated! You can view it in the canvas on the right. Use the <strong>Copy</strong> or <strong>Download</strong> buttons to save it.`;
                    chatMessages.appendChild(aiMsg);
                    
                    const chatActions = document.createElement('div');
                    chatActions.className = 'chat-actions';
                    chatActions.innerHTML = `
                        <a href="/" class="btn-secondary">
                            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
                                <path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311V15a.75.75 0 01-1.5 0v-3.5a.75.75 0 01.75-.75H8.5a.75.75 0 010 1.5H7.058l.263.262a4 4 0 006.693-1.796.75.75 0 011.298.762zM4.688 8.576a5.5 5.5 0 019.201-2.466l.312.311V5a.75.75 0 011.5 0v3.5a.75.75 0 01-.75.75H11.5a.75.75 0 010-1.5h1.442l-.263-.262a4 4 0 00-6.693 1.796.75.75 0 01-1.298-.762z" clip-rule="evenodd" />
                            </svg>
                            New Chat
                        </a>
                    `;
                    chatMessages.appendChild(chatActions);
                }
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
            })
            .catch(err => {
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('canvas-panel').classList.remove('active');
                const errorMsg = document.createElement('div');
                errorMsg.className = 'error-block';
                errorMsg.innerHTML = `<strong>Error:</strong> ${err.message || 'An unexpected error occurred.'}`;
                chatMessages.appendChild(errorMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        // ===========================
        // COPY TO CLIPBOARD
        // Reads the raw markdown from the hidden script tag and
        // copies it to the user's clipboard using the Clipboard API.
        // Shows a brief "Copied!" confirmation via the toast and
        // a green check on the button.
        // ===========================
        function copyPersona() {
            const rawEl = document.getElementById('raw-markdown');
            if (!rawEl) return;

            const rawMarkdown = JSON.parse(rawEl.textContent);
            navigator.clipboard.writeText(rawMarkdown).then(function () {
                // Show success state on button
                const btn = document.getElementById('copy-btn');
                btn.classList.add('copied');
                btn.innerHTML = `
                    <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                    </svg>
                    Copied!
                `;
                showToast('Copied to clipboard!');

                // Reset the button back to normal after 2 seconds
                setTimeout(function () {
                    btn.classList.remove('copied');
                    btn.innerHTML = `
                        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="6" y="6" width="10" height="12" rx="1.5"/>
                            <path d="M4 14V4a1.5 1.5 0 011.5-1.5H12"/>
                        </svg>
                        Copy
                    `;
                }, 2000);
            });
        }

        // ===========================
        // DOWNLOAD AS MARKDOWN
        // Creates a .md file in the browser from the raw markdown text,
        // triggers a download, and shows a toast confirmation.
        // ===========================
        function downloadPersona() {
            const rawEl = document.getElementById('raw-markdown');
            if (!rawEl) return;

            const rawMarkdown = JSON.parse(rawEl.textContent);

            // Extract the first heading from the markdown to use as the filename.
            let filename = 'download.md';
            const titleMatch = rawMarkdown.match(/^#{1,4}\s+(.+)$/m);
            if (titleMatch) {
                // Grab the heading text
                let title = titleMatch[1].trim();
                // Keep it short by taking the first 5 words
                title = title.split(/\s+/).slice(0, 5).join('-');
                // Convert to lowercase and remove any special characters
                title = title.toLowerCase().replace(/[^a-z0-9-]/g, '');
                // Remove consecutive hyphens and trailing/leading hyphens
                title = title.replace(/-+/g, '-').replace(/^-|-$/g, '');
                
                if (title) {
                    filename = `${title}.md`;
                }
            }

            // Create a Blob (binary large object) from the markdown text,
            // then create a temporary link to trigger the download.
            const blob = new Blob([rawMarkdown], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast('Downloading persona...');
        }

        // ===========================
        // TOAST NOTIFICATION
        // Shows a small pop-up at the bottom of the screen for 2.5 seconds
        // with a custom message. Used by copy and download functions.
        // ===========================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message || 'Done!';
            toast.classList.add('visible');
            setTimeout(function () {
                toast.classList.remove('visible');
            }, 2500);
        }

        // ===========================
        // TEXTAREA AUTO-SUBMIT ON ENTER
        // Allows the user to press Enter to submit the form.
        // Shift+Enter still creates a new line for multi-line input.
        // ===========================
        const textarea = document.getElementById('user_input');
        if (textarea) {
            textarea.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    document.getElementById('chat-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
                }
            });
        }
    </script>
